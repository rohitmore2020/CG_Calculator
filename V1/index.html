<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGPA Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Login Section -->
<div id="loginSection" class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h2>Sign In</h2>
            <p>Use your SGGS college email to access the SGPA Calculator</p>
        </div>
        <button id="loginBtn" class="google-btn">
            <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Sign in with Google
        </button>
        <p id="loginError" class="error-msg" style="display: none;"></p>
    </div>
</div>

<!-- Calculator Section -->
<div id="calculatorSection" class="container" style="display: none;">
    <h2>Semester VI SGPA Calculator</h2>
    <p id="userInfo" class="user-info"></p>

    <table>
        <thead>
            <tr>
                <th>Subject</th>
                <th>Theory Grade</th>
                <th>Practical Grade</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <p class="note">
        * For MDM: If practical isn't conducted separately,
        choose same grade as theory.
    </p>

    <button id="calculateBtn">Calculate SGPA</button>

    <button onclick="window.location.href='leaderboard.html'">
        View Leaderboard
    </button>

    <div id="result"></div>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
